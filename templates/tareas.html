{% extends "base.html" %}
{% block content %}

<h2>Gestor de tareas 📋</h2>

<form method="POST" action="/agregar">
    <input type="text" name="tarea" placeholder="Nueva tarea">
    <button type="submit">Agregar</button>
</form>

<ul>
    {% for t in tareas %}
        <li>
            {{ t.tarea }}
            <a href="/eliminar/{{ t._id }}">❌</a>
        </li>
    {% endfor %}
</ul>

{% endblock %}
