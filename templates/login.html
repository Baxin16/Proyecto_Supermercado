{% extends 'base.html' %}

{% block titulo %}
    INICIO DE SESIÓN - NovaMart
{% endblock titulo %}

{% block contenido %}

<body>

    <div class="row">
        <div class="col-12 header">
            <h1 class="text-center fw-bold m-0">INICIAR SESIÓN</h1>
        </div>
    </div>

    <main class="container d-flex justify-content-center">

        <div class="card shadow p-5 mt-4" style="max-width: 550px; width: 100%;">
            
            <h2 class="text-center mb-2">Bienvenido</h2>
            <p class="text-center text-muted mb-4">Ingresa tus datos para continuar</p>

            <form method="POST" action="/login">

                <div class="mb-3">
                    <label for="usuario" class="form-label">Usuario</label>
                    <input type="email" class="form-control" id="usuario" name="usuario" placeholder="Ingresa tu correo electronico" required>
                </div>

                <div class="mb-3">
                    <label for="contraseña" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="contraseña" name="contraseña" placeholder="Ingresa tu contraseña" required>
                </div>

                <div class="text-center mt-4">
                    <button type="submit" class="btn boton w-50">
                        Entrar
                    </button>
                </div>

                <div class="text-center mt-4">
                    ¿No tienes una cuenta?
                    <a href="/registro" class="link">Crear cuenta</a>
                </div>

                <div class="text-center mb-3">
                    <a href="/recuperar" class="link">¿Olvidaste tu contraseña?</a>
                </div>

            </form>

        </div>

    </main>

</body>

{% endblock %}
