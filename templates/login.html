{% extends 'base.html' %}

{% block titulo %}
    INICIO DE SESION - NovaMart
{% endblock titulo %}

{% block contenido %}
    <style>
        .header-login {
            background-color: #ff8484;
            color: white;
            padding: 15px;S
        }

        .link {
            color: #d40000;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>

<body>

    <div class="container-fluid p-0">

        <div class="row">
            <div class="col-12 header-login">
                <h1 class="text-center fw-bold m-0">
                    INICIAR SESIÓN
                </h1>
            </div>
        </div>

        <main class="container mt-5">
            <div class="row justify-content-center">

                <div class="col-12 col-sm-10 col-md-8 col-lg-5 p-5 shadow bg-white rounded">

                    <h2 class="text-center mb-2">
                        Bienvenido
                    </h2>

                    <p class="text-center text-muted mb-4">
                        Ingresa tus datos para continuar
                    </p>

                    <form method="POST" action="/login">

                        <div class="mb-3">
                            <label for="usuario" class="form-label">
                                Usuario
                            </label>

                            <input type="text"
                                class="form-control"
                                id="usuario"
                                name="usuario"
                                placeholder="Ingresa tu usuario"
                                required>
                        </div>

                        <div class="mb-3">
                            <label for="contraseña" class="form-label">
                                Contraseña
                            </label>

                            <input type="password"
                                class="form-control"
                                id="contraseña"
                                name="contraseña"
                                placeholder="Ingresa tu contraseña"
                                required>
                        </div>

                        <div class="text-center mt-4">
                            <button type="submit"
                                    class="btn text-white w-50" style="background: linear-gradient(45deg, #ff2727, #78a3ff); border: 2px solid black; ">
                                Entrar
                            </button>
                        </div>

                        <div class="text-center mt-4">
                            ¿No tienes una cuenta?
                            <a href="/registro" class="link">
                                Crear cuenta
                            </a>
                        </div>

                        <div class="text-center mb-3">
                            <a href="/recuperar" class="link">
                                ¿Olvidaste tu contraseña?
                            </a>
                        </div>

                    </form>

{% endblock contenido %}
