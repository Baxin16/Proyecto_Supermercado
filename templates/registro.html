{% extends 'base.html' %}

{% block titulo %}
    REGISTRO - NovaMart
{% endblock titulo %}

{% block contenido %}

<body>

    <div class="row">
        <div class="col-12 header">
            <h1 class="text-center fw-bold m-0">REGISTRO PARA NUEVOS USUARIOS</h1>
        </div>
    </div>

    <main class="container d-flex justify-content-center">
        <div class="card shadow p-5 mt-4" style="max-width: 550px; width: 100%;">

            <h2 class="text-center">Crea una cuenta</h2>
            <p class="text-center">Es rápido y fácil.</p>

            <form action="/registro" method="POST">

                <section class="row">
                    <div class="col-6 mb-3">
                        <label for="nombre" class="form-label">NOMBRES</label>
                        <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Nombre" required>
                    </div>
                    <div class="col-6 mb-3">
                        <label for="apellidos" class="form-label">APELLIDOS</label>
                        <input type="text" class="form-control" id="apellidos" name="apellidos" placeholder="Apellidos" required>
                    </div>
                </section>

                <label class="form-label">Fecha de nacimiento</label>
                <div class="row mb-3">
                    <div class="col-4">
                        <select class="form-select" name="dia" required>
                            <option value="">Día</option>
                            {% for i in range(1, 32) %}
                                <option value="{{ i }}">{{ i }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-4">
                        <select class="form-select" name="mes" required>
                            <option value="">Mes</option>
                            <option>Enero</option><option>Febrero</option><option>Marzo</option><option>Abril</option>
                            <option>Mayo</option><option>Junio</option><option>Julio</option><option>Agosto</option>
                            <option>Septiembre</option><option>Octubre</option><option>Noviembre</option><option>Diciembre</option>
                        </select>
                    </div>
                    <div class="col-4">
                        <select class="form-select" name="año" required>
                            <option value="">Año</option>
                            {% for i in range(1980, 2025) %}
                                <option value="{{ i }}">{{ i }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <label class="form-label">Género</label>
                <div class="d-flex mb-3 justify-content-between">
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="genero" value="Mujer" required>
                        <label class="form-check-label">Mujer</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="genero" value="Hombre">
                        <label class="form-check-label">Hombre</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="genero" value="Personalizado">
                        <label class="form-check-label">Personalizado</label>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="usuario" class="form-label">Usuario o Correo Electrónico</label>
                    <input type="text" class="form-control" id="usuario" name="usuario" placeholder="Usuario o correo" required>
                </div>

                <div class="mb-3">
                    <label for="contraseña" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="contraseña" name="contraseña" placeholder="Contraseña nueva" required>
                </div>

                <div class="text-center mt-4">
                    <button type="submit" class="btn boton w-50">Registrarte</button>
                </div>

            </form>

            <!-- ENLACE A LOGIN -->
            <div class="text-center mt-4">
                <a href="/" class="link">¿Ya tienes una cuenta?</a>
            </div>

        </div>
    </main>

</body>

{% endblock %}
